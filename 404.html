<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>頁面不存在 · AIve</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/icon.png">
<style>
  :root {
    --primary: #7B6BFF;
    --primary-dark: #5A4DD6;
    --pink: #E879F9;
    --bg: #F7F5FF;
    --surface: #FFFFFF;
    --text: #1F1B2E;
    --text-muted: #5C5670;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
      "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  main {
    text-align: center;
    max-width: 420px;
  }
  .glyph {
    font-size: 88px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--primary) 0%, var(--pink) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0 0 12px;
    line-height: 1;
    letter-spacing: -2px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 12px;
  }
  p {
    color: var(--text-muted);
    font-size: 15px;
    margin: 0 0 28px;
    line-height: 1.7;
  }
  a.btn {
    display: inline-block;
    padding: 12px 26px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 6px 16px rgba(123, 107, 255, 0.3);
  }
</style>
</head>
<body>
<main>
  <div class="glyph">404</div>
  <h1>這頁找不到</h1>
  <p>你想找的頁面可能搬家了，或者連結過期了。<br>回首頁繼續探索 AIve 吧。</p>
  <a class="btn" href="/">回 AIve 首頁</a>
</main>
</body>
</html>
